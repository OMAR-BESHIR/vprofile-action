name: vprofile actions
on: workflow_dispatch
env:
    AWS_REGION: us-east-1
    ECR_REPOSITORY: vprofileapp
    EKS_CLUSTER: my-eks

jobs:
    Testing:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
              
            - name: Maven test  
              run: mvn test

            - name: Checkstyle
              run: mvn checkstyle:checkstyle 

            - name: Setup java
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' 
                java-version: '25'

            - name: Setup SonarQube
              uses: SylvainDumas/setup-sonar-scanner@v1 
              
            - name: SonarQube Scan
              run: sonar-scanner
                -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
                -Dsonar.token=${{ secrets.SONAR_TOKEN }}
                -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
                -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
                -Dsonar.sources=src/
                -Dsonar.junit.reportsPath=target/surefire-reports/
                -Dsonar.jacoco.reportPath=target/jacoco.exec
                -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
                -Dsonar.java.binaries=target/test-classes/com/visualpathit/account

            - name: SonarQube Quality Gate check
              id: sonarqube-quality-gate-check
              uses: sonarsource/sonarqube-quality-gate-action@master
              with:
                pollingTimeoutSec: 300
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}            
  
    BUILD_AND_PUBLISH:
        needs: Testing
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Build & Upload image to ECR 
              uses: appleboy/docker-ecr-action@master
              with:
                access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
                secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                registry: ${{ secrets.REGISTRY }}
                repo: ${{ env.ECR_REPOSITORY}}
                region: ${{ env.AWS_REGION}}
                tags: latest,${{ github.run_number }}
                daemon_off: false
                dockerfile: ./Dockerfile
                context: ./ 

    DEPLOY_TO_EKS:
        needs: BUILD_AND_PUBLISH
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source code
              uses: actions/checkout@v4  

            - name: Configure AWS Credentials  
              uses: aws-actions/configure-aws-credentials@v4  
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ env.AWS_REGION }}

            - name: Get Kube config file
              run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

            - name: Login to ECR 
              run: kubectl create secret docker-registry regcred --docker-server=${{ secret.REGISTRY }} --docker-username=AWS --docker-password=$(aws ecr get-Login-password)

            - name: Deploy to EKS with Helm
              uses: bitovi/github-actions-deploy-eks-helm@v1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ env.AWS_REGION }}
                cluster-name: ${{ env.EKS_CLUSTER }}
                namespace: default
                chart-path: helm/vprofilecharts
                values: appimage=${{ secret.REGISTRY }}/${{ env.ECR_REPOSITORY }},apptag=${{ github.run_number }}
                name: vprofile-stack 
